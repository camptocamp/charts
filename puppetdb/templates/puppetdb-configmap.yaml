---
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "puppetdb.fullname" . }}-jetty
  labels:
    app.kubernetes.io/name: {{ include "puppetdb.name" . }}
    helm.sh/chart: {{ include "puppetdb.chart" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
data:
  jetty: |-
    [jetty]
    host = 127.0.0.1
    port = 8080
    ssl-host = 0.0.0.0
    ssl-port = 8081
    ssl-key = /etc/puppetlabs/puppet/ssl/private_keys/puppetdb.pem
    ssl-cert = /etc/puppetlabs/puppet/ssl/certs/puppetdb.pem
    ssl-ca-cert = /etc/puppetlabs/puppet/ssl/certs/ca.pem

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "puppetdb.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "puppetdb.name" . }}
    helm.sh/chart: {{ include "puppetdb.chart" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
data:
  puppetdb.ini: |-
{{ .Values.puppetdb.puppetdb_ini | indent 4 }}
  metrics.conf: |-
{{ .Values.puppetdb.metrics_conf | indent 4 }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "puppetdb.fullname" . }}-postgresql
  labels:
    app.kubernetes.io/name: {{ include "puppetdb.name" . }}
    helm.sh/chart: {{ include "puppetdb.chart" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
data:
  postgresql.crt: |-
{{ .Values.puppetdb.postgresql_cert | indent 4 }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "puppetdb.fullname" . }}-jmx-exporter
  labels:
    app.kubernetes.io/name: {{ include "puppetdb.name" . }}
    helm.sh/chart: {{ include "puppetdb.chart" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
data:
  config.yaml: |-
    ---
    whitelistObjectNames:
      - puppetlabs.puppetdb.population:name=num-nodes
      - puppetlabs.puppetdb.population:name=num-resources
      - puppetlabs.puppetdb.population:name=avg-resources-per-node
      - puppetlabs.puppetdb.population:name=pct-resource-dupes
      - puppetlabs.puppetdb.database:*
      - puppetlabs.puppetdb.mq:*
      - puppetlabs.puppetdb.storage:name=duplicate-pct
      - puppetlabs.puppetdb.storage:name=gc-time
      - java.lang:type=Memory
      - java.lang:type=OperatingSystem
      - java.lang:type=Threading
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "puppetdb.fullname" . }}-jolokia
  labels:
    app.kubernetes.io/name: {{ include "puppetdb.name" . }}
    helm.sh/chart: {{ include "puppetdb.chart" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
data:
  jolokia-access.xml: |-
{{ .Values.puppetdb.jolokia_access | indent 4 }}
